<style>
        .viewfinder-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #ffba38; /* tertiary-fixed-dim */
            border-style: solid;
            animation: pulse-corner 2s infinite;
        }
        .corner-tl { top: 0; left: 0; border-width: 4px 0 0 4px; border-top-left-radius: 12px; }
        .corner-tr { top: 0; right: 0; border-width: 4px 4px 0 0; border-top-right-radius: 12px; }
        .corner-bl { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-bottom-left-radius: 12px; }
        .corner-br { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-bottom-right-radius: 12px; }

        @keyframes pulse-corner {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1); }
        }

        .scanning-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffba38, transparent);
            top: 0;
            animation: scan 3s linear infinite;
            box-shadow: 0 0 8px #ffba38;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background-color: #f8faf5;
        }
    </style>
</head>
<body class="text-on-surface font-body-md">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 bg-surface/80 backdrop-blur-md px-margin-mobile h-16 flex items-center justify-between border-b border-outline-variant">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-headline-md text-on-surface">KrishiOS</h1>
</div>
<div class="flex items-center gap-1">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container">
<span class="material-symbols-outlined text-on-surface">help</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col p-margin-mobile gap-6">
<!-- Instruction Section -->
<div class="space-y-2">
<h2 class="text-headline-lg-mobile text-on-surface">Identify Crop Disease</h2>
<p class="text-body-md text-on-surface-variant">Point your camera at the affected leaves or stems for a real-time AI diagnosis.</p>
</div>
<!-- Camera Viewfinder Area -->
<div class="relative flex-1 min-h-[320px] rounded-2xl overflow-hidden bg-black shadow-lg">
<!-- Simulated Camera Feed -->
<img alt="Camera Preview" class="absolute inset-0 w-full h-full object-cover opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBL1pQSs_sdx44bPpSr0Aqwer8eRZj3GEUcjm2BCH6Iz4vd8ryNeESmfpNRLBZSnAsyyWYTNOr0mX6fmPdX4DVC-aR1-dfa19rnY-hlG0vCiW2Z9w84Q-G9F_NQWXhC4hNYG6WcYNyH2OG0nJQsupQ6rI7wx79Jt98cUDyxDkVDYRLPh3aD7aTiGdTusnYeEZM7unF-kl9EsiJY3_NB97DL0tA7ZfycmK_Xq8-H2UVa1-IDlVa6JJ160g"/>
<!-- Overlay Viewfinder UI -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="relative w-64 h-64">
<div class="viewfinder-corner corner-tl"></div>
<div class="viewfinder-corner corner-tr"></div>
<div class="viewfinder-corner corner-bl"></div>
<div class="viewfinder-corner corner-br"></div>
<div class="scanning-line"></div>
</div>
</div>
<!-- Lighting/Zoom Controls -->
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-6 px-6 py-2 bg-black/40 backdrop-blur-sm rounded-full">
<button class="text-white">
<span class="material-symbols-outlined text-[24px]">flash_off</span>
</button>
<div class="h-4 w-[1px] bg-white/20"></div>
<span class="text-white text-label-md">1x</span>
<div class="h-4 w-[1px] bg-white/20"></div>
<button class="text-white">
<span class="material-symbols-outlined text-[24px]">zoom_in</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 pb-4">
<button class="flex items-center justify-center gap-2 bg-primary text-on-primary h-touch-target-min rounded-full font-label-md shadow-md active:scale-95 transition-transform">
<span class="material-symbols-outlined">photo_camera</span>
                Capture Photo
            </button>
<button class="flex items-center justify-center gap-2 bg-secondary-container text-on-secondary-container h-touch-target-min rounded-full font-label-md active:scale-95 transition-transform">
<span class="material-symbols-outlined">image</span>
                Upload from Gallery
            </button>
</div>
</main>
<!-- Navigation Bar (Optional but good for app context) -->
<nav class="bg-surface-container px-4 py-2 flex justify-around border-t border-outline-variant">
<button class="flex flex-col items-center gap-1 p-2 text-on-surface-variant">
<span class="material-symbols-outlined">home</span>
<span class="text-label-sm">Home</span>
</button>
<button class="flex flex-col items-center gap-1 p-2 text-primary">
<span class="material-symbols-outlined fill-1">document_scanner</span>
<span class="text-label-sm font-semibold">Scan</span>
</button>
<button class="flex flex-col items-center gap-1 p-2 text-on-surface-variant">
<span class="material-symbols-outlined">history</span>
<span class="text-label-sm">History</span>
</button>
<button class="flex flex-col items-center gap-1 p-2 text-on-surface-variant">
<span class="material-symbols-outlined">account_circle</span>
<span class="text-label-sm">Profile</span>
</button>
</nav>
</body></html>
