name: Python AI CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ai/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ai/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd ai
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run code styling checks (flake8)
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 ai/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 ai/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run training script sanity run (1 epoch)
      run: |
        cd ai
        python -m training.train --epochs 1
